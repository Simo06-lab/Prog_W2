<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Amazon page</title>
  </head>
  <body>
    <header>
      <div class="header_top">
        <img src="./images/logo.png" alt="logo amazon" />
      </div>
      <nav class="header_nav">
        <ul>
          <li><a href="#">All</a></li>
          <li><a href="#">Today's deals</a></li>
          <li><a href="#">Customer Service</a></li>
          <li><a href="#">Registry</a></li>
          <li><a href="#">Gift Cards</a></li>
          <li><a href="#">Sell</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="Gift_bar">
        <p>Shop All Holiday Gift Cards</p>
      </div>
      <section class="Holiday_bann">
        <div class="Holiday">
          <h1>Holiday Gift Guides</h1>
          <p>Be a go-gifter</p>
        </div>
      </section>
      <section class="foto-section">
        <div class="foto-header">
          <h3>Find the perfect gift</h3>
          <a href="#">Shop now</a>
        </div>
        <div class="foto">
          <img src="./images/img_1.jpg" alt="ipad" />
          <img src="./images/img_2.jpg" alt="Laptop" />
          <img src="./images/img_3.jpg" alt="Watch" />
          <img src="./images/img_4.jpg" alt="Pets" />
        </div>
      </section>
      <section class="vr-section">
        <img src="./images/img_9.png" alt="VR " />
        <div class="foto-header">
          <h3>Play the gifting game</h3>
          <a href="#">Shop gaming</a>
        </div>
      </section>
      <section class="vr-section">
        <img src="./images/img_10.png" alt="VR " />
        <div class="foto-header">
          <h3>Play the gifting game</h3>
          <a href="#">Shop gaming</a>
        </div>
      </section>
    </main>
    <footer>
      <nav class="footer">
        <a href="#">Back to top</a>
      </nav>
      <div class="footer_bootom">
        <img src="./images/logo.png" alt="logo amazon" />
      </div>
    </footer>
  </body>
</html>
